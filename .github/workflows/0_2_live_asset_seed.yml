name: 0.2 Live Asset Seed

on:
  workflow_dispatch:
    inputs:
      smoke_limit:
        description: "Optional small-run limit for smoke testing"
        required: false
        default: ""
      chain_next:
        description: "Verify output and dispatch the next workflow"
        required: false
        default: "false"

permissions:
  contents: write
  actions: write

jobs:
  materialize-live-asset-seeds:
    runs-on: ubuntu-latest
    env:
      BOT_SMOKE_LIMIT: ${{ inputs.smoke_limit }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate UPV2 live context
        run: python run_validate_live_context.py --context setup/live_context_v2.json --validation-out setup/live_context_validation.json

      - name: Materialize live asset scanner seeds
        run: python run_materialize_live_asset_seeds.py --context setup/live_context_v2.json --out-dir scanned

      - name: Commit and push live asset seeds
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add scanned setup/live_context_validation.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Materialize UPV2 live asset scanner seeds 648guf5868gfj58685f"
          n=0
          until [ $n -ge 3 ]; do
            git pull --rebase origin master
            if git push origin master; then
              echo "Push succeeded"
              break
            fi
            n=$((n+1))
            echo "Push failed, retrying in 5 seconds..."
            sleep 5
          done

          if [ $n -eq 3 ]; then
            echo "Failed to push after 3 attempts"
            exit 1
          fi

      - name: Verify and advance chain
        if: inputs.chain_next == 'true'
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: python workflow_chain.py advance --stage 0.2 --next-workflow 1_split_scope.yml --smoke-limit "${{ inputs.smoke_limit }}"

