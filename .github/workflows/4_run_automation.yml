name: 4 Audit Automation

on:
  workflow_dispatch:
    inputs:
      smoke_limit:
        description: "Optional small-run limit for smoke testing"
        required: false
        default: ""
      chain_next:
        description: "Verify output and dispatch the next workflow"
        required: false
        default: "false"

#  push:
#    branches:
#      - master

permissions:
  contents: write
  actions: write

concurrency:
  group: audit-pipeline-master
  cancel-in-progress: false


jobs:

  audit-shard:
    runs-on: ubuntu-latest
    env:
      BOT_SMOKE_LIMIT: ${{ inputs.smoke_limit }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'


      - name: Install dependencies

        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager
          pip install -r requirements.txt || echo "No requirements.txt found, skipping"


      - name: Check for question files
        id: check_questions
        run: |
          if [ -z "$(find question -type f -name '*.json' -print -quit 2>/dev/null)" ]; then
            echo "::error::Stage 4 has no question/*.json input. Run Workflow 3 after its scope_questions/*.json input has been produced."
            exit 1
          fi
          echo "Question files found, continuing workflow"
          echo "run_workflow=true" >> "$GITHUB_OUTPUT"

      - name: Run Generate File
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

        if: steps.check_questions.outputs.run_workflow == 'true'
        run: python run_generate_file.py


      - name: Install Chrome
        if: steps.check_questions.outputs.run_workflow == 'true'
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run Audit automation
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

        if: steps.check_questions.outputs.run_workflow == 'true'
        run: python run_automation.py

      - name: Commit and push changes
        if: steps.check_questions.outputs.run_workflow == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .

          if git diff --cached --quiet; then
            echo "Stage 4 produced no tracked output"
            exit 1
          fi

          git commit -m "Auto-update: collections and reports 648guf5868gfj58685f"
          # Retry logic
          n=0
          until [ $n -ge 3 ]; do
            git pull --rebase origin master
            if git push origin master; then
              echo "Push succeeded"
              break
            fi
            n=$((n+1))
            echo "Push failed, retrying in 5 seconds..."
            sleep 5
          done
          
          # Fail the step if all retries are exhausted
          if [ $n -eq 3 ]; then
          echo "Failed to push after 3 attempts"
          exit 1
          fi


      - name: Verify and advance chain
        if: steps.check_questions.outputs.run_workflow == 'true'
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: python workflow_chain.py advance --stage 4 --same-workflow 4_run_automation.yml --next-workflow 5_run_report.yml --smoke-limit "${{ inputs.smoke_limit }}"

