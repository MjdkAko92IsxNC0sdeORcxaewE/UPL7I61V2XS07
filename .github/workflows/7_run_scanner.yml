name: 7 Run Scanner Automation

on:
  workflow_dispatch:
    inputs:
      smoke_limit:
        description: "Optional small-run limit for smoke testing"
        required: false
        default: ""
      chain_next:
        description: "Verify output and dispatch the next workflow"
        required: false
        default: "false"
#  push:
#    branches:
#      - master


permissions:
  contents: write
  actions: write

jobs:
  run-deepwiki:
    runs-on: ubuntu-latest
    env:
      BOT_SMOKE_LIMIT: ${{ inputs.smoke_limit }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager
          pip install -r requirements.txt || echo "No requirements.txt found, skipping"

      - name: Validate UPV2 live context
        run: python run_validate_live_context.py --context setup/live_context_v2.json

      - name: Check for Workflow 7 scanned inputs
        id: check_audited
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          live_asset = past_hack = legacy_or_unknown = 0
          for path in sorted(Path("scanned").glob("*")):
              if not path.is_file() or path.suffix not in {".json", ".md"}:
                  continue
              if path.suffix == ".json":
                  try:
                      data = json.loads(path.read_text(encoding="utf-8"))
                  except Exception:
                      legacy_or_unknown += 1
                      continue
                  seed_type = data.get("seed_type") or data.get("schema_version")
                  if seed_type in {"live_asset_ledger", "upv2-live-asset-scan-seed-v1"}:
                      live_asset += 1
                  elif seed_type in {"past_live_hack", "past_live_hack_seed", "historical_live_hack", "historical_exploit_seed", "upv2-past-live-hack-seed-v1"}:
                      past_hack += 1
                  else:
                      legacy_or_unknown += 1
              else:
                  legacy_or_unknown += 1
          print(f"Workflow 7 scanned inputs: live_asset={live_asset}, past_live_hack={past_hack}, legacy_or_unknown={legacy_or_unknown}")
          PY
          if [ -n "$(find scanned \( -name '*.md' -o -name '*.json' \) | head -n 1)" ]; then
            echo "run_workflow=true" >> $GITHUB_OUTPUT
          else
            echo "run_workflow=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Validator
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

        if: steps.check_audited.outputs.run_workflow == 'true'
        run: python run_generate_scanned_questions_pending.py

      - name: Commit and push changes
        if: steps.check_audited.outputs.run_workflow == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          
          git commit -m "Auto-update: collections and reports 648guf5868gfj58685f"
          # Retry logic
          n=0
          until [ $n -ge 3 ]; do
            git pull --rebase origin master
            if git push --force origin master; then
              echo "Push succeeded"
              break
            fi
            n=$((n+1))
            echo "Push failed, retrying in 5 seconds..."
            sleep 5
          done
          
          # Fail the step if all retries are exhausted
          if [ $n -eq 3 ]; then
          echo "Failed to push after 3 attempts"
          exit 1
          fi


      - name: Trigger next batch after generate
        if: steps.check_audited.outputs.run_workflow == 'true' && inputs.smoke_limit == '' && inputs.chain_next != 'true'
        uses: nick-fields/retry@v3
        with:
          max_attempts: 5
          timeout_seconds: 60
          retry_on: 'error'
          retry_wait_seconds: 300  # 5 minutes between retries
          command: |
            #!/bin/bash
            set -e
            # Using curl directly with the GitHub API
            curl -X POST \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Authorization: token ${{ secrets.PAT_TOKEN }}" \
              https://api.github.com/repos/${{ github.repository }}/actions/workflows/7_run_scanner.yml/dispatches \
              -d '{"ref":"master"}'
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Run Validator
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

        if: steps.check_audited.outputs.run_workflow == 'true'
        run: python run_scanner.py


      - name: Commit and push changes
        if: steps.check_audited.outputs.run_workflow == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          
          git commit -m "Auto-update: collections and reports 648guf5868gfj58685f"
          # Retry logic
          n=0
          until [ $n -ge 3 ]; do
            git pull --rebase origin master
            if git push --force origin master; then
              echo "Push succeeded"
              break
            fi
            n=$((n+1))
            echo "Push failed, retrying in 5 seconds..."
            sleep 5
          done
          
          # Fail the step if all retries are exhausted
          if [ $n -eq 3 ]; then
          echo "Failed to push after 3 attempts"
          exit 1
          fi

      - name: Verify and advance chain
        if: steps.check_audited.outputs.run_workflow == 'true' && inputs.chain_next == 'true'
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: python workflow_chain.py advance --stage 7 --same-workflow 7_run_scanner.yml --next-workflow 8_run_validator_report.yml --smoke-limit "${{ inputs.smoke_limit }}"


